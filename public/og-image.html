<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: #030711; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
.bar { width: 100%; height: 3px; background: linear-gradient(90deg, #00e4b8, #2da1ff); opacity: 0.6; position: absolute; top: 0; }
.bar2 { width: 100%; height: 3px; background: linear-gradient(90deg, #00e4b8, #2da1ff); opacity: 0.3; position: absolute; bottom: 0; }
.logo { font-size: 72px; font-weight: 900; letter-spacing: -2px; margin-bottom: 16px; }
.cr { background: linear-gradient(90deg, #FE2C55, #25F4EE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sh { background: linear-gradient(90deg, #0668E1, #00C2FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 28px; font-weight: 500; color: #7d8aaa; margin-bottom: 16px; }
.desc { font-size: 20px; color: #5a6478; margin-bottom: 40px; }
.pill { padding: 12px 32px; border-radius: 10px; background: rgba(0, 228, 184, 0.12); border: 1px solid rgba(0, 228, 184, 0.25); color: #00e4b8; font-size: 16px; font-weight: 700; }
</style>
</head>
<body>
<div class="bar"></div>
<div class="logo"><span class="cr">Creator</span><span class="sh">ship</span></div>
<div class="sub">TikTok Creators &times; Meta Ads</div>
<div class="desc">Discover creators. License content. Launch campaigns. 90 seconds.</div>
<div class="pill">creatorship.app</div>
<div class="bar2"></div>
</body>
</html>
