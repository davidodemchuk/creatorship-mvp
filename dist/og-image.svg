<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="tiktok" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FE2C55"/>
      <stop offset="100%" stop-color="#25F4EE"/>
    </linearGradient>
    <linearGradient id="meta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0668E1"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e4b8"/>
      <stop offset="100%" stop-color="#2da1ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#030711"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" opacity="0.6"/>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900">
    <tspan fill="url(#tiktok)">Creator</tspan><tspan fill="url(#meta)">ship</tspan>
  </text>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="500" fill="#7d8aaa">TikTok Creators &#215; Meta Ads</text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="400" fill="#5a6478">Discover creators. License content. Launch campaigns. 90 seconds.</text>
  <rect x="490" y="450" width="220" height="48" rx="10" fill="url(#accent)" opacity="0.15"/>
  <rect x="490" y="450" width="220" height="48" rx="10" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <text x="600" y="481" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#00e4b8">creatorship.app</text>
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)" opacity="0.3"/>
</svg>
